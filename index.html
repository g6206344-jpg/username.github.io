<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Followers UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* FULL SCREEN FIX */
html, body {
  height: 100%;
}

body {
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #6a11cb, #ff3c6f);
}

/* HEADER */
.header {
  text-align: center;
  color: white;
  padding: 20px 10px;
}

.header h1 {
  font-size: 22px;
  margin-bottom: 5px;
}

.header p {
  font-size: 14px;
  opacity: 0.8;
}

/* CENTER AREA */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

.card h2 {
  margin-bottom: 15px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #ff3c6f;
  color: white;
  font-size: 15px;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 14px;
}

/* FOOTER FIX (NO GAP) */
.footer {
  display: flex;
  justify-content: space-around;
  padding: 12px;
  color: white;
  font-size: 14px;
  background: rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<div class="header">
  <h1>🔥 Get Free Instagram Followers</h1>
  <p>Increase your followers instantly</p>
</div>

<div class="main">
  <div class="card">
    <h2>Free Followers</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="number" id="amount" placeholder="Followers amount">

    <button onclick="run()">Get Followers</button>

    <div class="status" id="status"></div>
  </div>
</div>

<div class="footer">
  <span>⚡ Fast</span>
  <span>🔒 Secure</span>
  <span>🚀 UI Demo</span>
</div>

<script>
function run() {
  let u = document.getElementById("username").value;
  let a = document.getElementById("amount").value;

  let s = document.getElementById("status");

  if(u === "" || a === "") {
    s.style.color = "red";
    s.innerText = "Fill all fields!";
    return;
  }

  s.style.color = "green";
  s.innerText = "Processing...";

  setTimeout(() => {
    s.innerText = "Done (demo)";
  }, 2000);
}
</script>

</body>
  </html>
